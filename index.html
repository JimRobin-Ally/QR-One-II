<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QR-One Argosari</title>
  <meta name="description" content="Satu QR untuk informasi Desa Argosari" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app" aria-label="Portal QR-One">
    <section class="profile" aria-labelledby="site-title">
      <div class="logo-wrap">
        <img id="mainLogo" class="main-logo" src="assets/logo-desa.svg" alt="Logo QR-One" />
      </div>

      <div class="mini-logos" aria-label="Logo pendukung">
        <img id="kknLogo" src="assets/logo-kkn.svg" alt="Logo KKN" />
        <img id="campusLogo" src="assets/logo-kampus.svg" alt="Logo Kampus" />
      </div>

      <p id="eyebrow" class="eyebrow">PORTAL INFORMASI DIGITAL</p>
      <h1 id="site-title">QR-One Argosari</h1>
      <p id="subtitle" class="subtitle">Satu QR untuk informasi desa.</p>
    </section>

    <section class="notice" aria-live="polite">
      <span aria-hidden="true">📍</span>
      <p id="noticeText">Pilih menu di bawah ini.</p>
    </section>

    <section class="search-box" aria-label="Cari informasi">
      <label for="searchInput">Cari cepat</label>
      <input id="searchInput" type="search" placeholder="Cari: UMKM, wisata, peta, darurat..." autocomplete="off" />
    </section>

    <section class="links" aria-label="Daftar menu utama">
      <div id="linkList"></div>
      <p id="emptyState" class="empty" hidden>Tidak ada menu yang cocok.</p>
    </section>

    <section class="small-info" aria-labelledby="infoTitle">
      <h2 id="infoTitle">Catatan</h2>
      <p id="validationText">Data diperbarui setelah observasi dan verifikasi.</p>
    </section>

    <footer>
      <p id="footerText">QR-One Argosari</p>
      <p id="lastUpdated" class="updated"></p>
    </footer>
  </main>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
